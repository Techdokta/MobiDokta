<html lang="en">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | MobiDokta</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(45,212,191,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(0,113,227,0.05) 0%, transparent 50%);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      padding: var(--space-12);
      text-align: center;
    }
    .login-card .logo { justify-content: center; margin-bottom: var(--space-8); font-size: 1.8rem; }
    .login-card h2 { margin-bottom: var(--space-2); }
    .login-card .subtitle { color: var(--text-tertiary); font-size: var(--text-sm); margin-bottom: var(--space-10); }
    .pin-inputs {
      display: flex;
      justify-content: center;
      gap: var(--space-4);
      margin-bottom: var(--space-8);
    }
    .pin-input {
      width: 56px; height: 64px;
      text-align: center;
      font-size: var(--text-2xl);
      font-weight: 800;
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-md);
      color: var(--cta);
      font-family: var(--font);
    }
    .pin-input:focus {
      outline: none;
      border-color: var(--cta);
      box-shadow: 0 0 0 3px var(--cta-glow);
    }
    .two-fa-section {
      display: none;
      animation: fadeInUp 0.3s ease;
    }
    .two-fa-section.visible { display: block; }
    .error-msg {
      color: var(--red);
      font-size: var(--text-sm);
      margin-bottom: var(--space-4);
      display: none;
    }
    .attempts-warning {
      color: var(--orange);
      font-size: var(--text-xs);
      margin-top: var(--space-4);
    }
    .demo-hint {
      background: rgba(0,113,227,0.05);
      border: 1px solid rgba(0,113,227,0.15);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      margin-top: var(--space-8);
      font-size: var(--text-xs);
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-card glass">
      <div class="logo"><img src="../assets/mobidokta-logo.svg" alt="MobiDokta — Engineering Grade IT Repairs &amp; Service" class="logo-nav" loading="eager"></div>
      <h2>Admin Portal</h2>
      <p class="subtitle">Enter your credentials to access the dashboard</p>

      <!-- Step 1: Password -->
      <div id="login-step">
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input type="email" class="form-input" id="admin-email" value="admin@mobidokta.co.za" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="admin-password" placeholder="Enter password" />
        </div>
        <div class="error-msg" id="login-error"></div>
        <button class="btn btn-primary btn-block btn-lg" id="login-btn">Sign In</button>
      </div>

      <!-- Step 2: 2FA -->
      <div class="two-fa-section" id="twofa-step">
        <h3 class="mb-2">2-Factor Authentication</h3>
        <p class="subtitle">Enter the 4-digit code sent to your device</p>
        <div class="pin-inputs">
          <input type="text" class="pin-input" maxlength="1" data-pin="0" />
          <input type="text" class="pin-input" maxlength="1" data-pin="1" />
          <input type="text" class="pin-input" maxlength="1" data-pin="2" />
          <input type="text" class="pin-input" maxlength="1" data-pin="3" />
        </div>
        <div class="error-msg" id="twofa-error"></div>
        <button class="btn btn-primary btn-block btn-lg" id="verify-btn">Verify & Enter</button>
      </div>

      <div class="demo-hint">
        <i data-lucide="key" class="icon-sm"></i> <strong>Demo:</strong> Use any email + password "admin". 2FA code: <strong>1234</strong>
      </div>
    </div>
  </div>

  <script src="../js/data-store.js"></script>
  <script src="../js/app.js"></script>
  <script>
    (function() {
      // Check if already logged in
      if (MobiStore.isAdminLoggedIn()) {
        window.location.href = 'dashboard.html';
        return;
      }

      const loginBtn = document.getElementById('login-btn');
      const verifyBtn = document.getElementById('verify-btn');
      const loginStep = document.getElementById('login-step');
      const tfaStep = document.getElementById('twofa-step');
      const loginError = document.getElementById('login-error');
      const tfaError = document.getElementById('twofa-error');
      const pinInputs = document.querySelectorAll('.pin-input');

      loginBtn.addEventListener('click', () => {
        const rateCheck = MobiApp.checkRateLimit();
        if (!rateCheck.allowed) {
          loginError.textContent = rateCheck.message;
          loginError.style.display = 'block';
          return;
        }

        const password = document.getElementById('admin-password').value;
        if (password === 'admin') {
          loginStep.style.display = 'none';
          tfaStep.classList.add('visible');
          pinInputs[0].focus();
        } else {
          MobiApp.recordLoginAttempt(false);
          loginError.textContent = 'Invalid credentials. Please try again.';
          loginError.style.display = 'block';
        }
      });

      // Auto-focus next PIN input
      pinInputs.forEach((input, i) => {
        input.addEventListener('input', () => {
          if (input.value && i < 3) pinInputs[i + 1].focus();
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !input.value && i > 0) pinInputs[i - 1].focus();
        });
      });

      verifyBtn.addEventListener('click', () => {
        const pin = Array.from(pinInputs).map(i => i.value).join('');
        if (MobiStore.adminLogin(pin)) {
          MobiApp.recordLoginAttempt(true);
          window.location.href = 'dashboard.html';
        } else {
          MobiApp.recordLoginAttempt(false);
          tfaError.textContent = 'Invalid code. Please try again.';
          tfaError.style.display = 'block';
          pinInputs.forEach(i => i.value = '');
          pinInputs[0].focus();
        }
      });

      // Allow Enter key
      document.getElementById('admin-password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') loginBtn.click();
      });
      pinInputs[3].addEventListener('input', () => {
        setTimeout(() => verifyBtn.click(), 200);
      });
    })();
  </script>
</body>
</html>
